name: Build Docs
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
  pages: write
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs mkdocs-materialx
      - run: mkdocs build --strict
