<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 600; font-size: 16px; fill: #1a1a1a; }
      .subtitle { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 500; font-size: 14px; fill: #333; }
      .widget { font-family: 'SF Mono', 'Menlo', 'Monaco', monospace; font-size: 12px; fill: #444; }
      .container { fill: #f5f5f5; stroke: #ccc; stroke-width: 1; }
      .panel { fill: #e8f4f8; stroke: #4a90a4; stroke-width: 1; }
      .button { fill: #4a90a4; fill-opacity: 0.1; stroke: #4a90a4; stroke-width: 1; }
      .preview { fill: #fff9c4; stroke: #fbc02d; stroke-width: 1; }
      .control { fill: #e1f5e1; stroke: #66bb6a; stroke-width: 1; }
      .line { stroke: #666; stroke-width: 1; }
      .connector { stroke: #999; stroke-width: 1; stroke-dasharray: 4 2; }
      .arrow { fill: #999; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <!-- Main Window -->
  <rect x="10" y="10" width="1180" height="780" class="container" rx="8" />
  <text x="592" y="35" text-anchor="middle" class="title">Main App (customtkinter.CTk)</text>

  <!-- Menu Bar -->
  <rect x="20" y="50" width="1160" height="40" class="panel" rx="4" />
  <text x="30" y="75" class="widget">CTkMenuBar</text>
  <text x="120" y="75" class="subtitle">[File] [Lines] [Image] [Video] [Style] [Export]</text>

  <!-- Main Root Frame -->
  <rect x="20" y="100" width="1160" height="600" class="container" rx="4" />
  <text x="30" y="120" class="widget">root (CTkFrame)</text>

  <!-- Inputs Panel (Left) -->
  <rect x="30" y="130" width="600" height="560" class="panel" rx="4" />
  <text x="40" y="150" class="subtitle">Inputs Panel (inputs_tabview)</text>

  <!-- Tabs -->
  <rect x="35" y="155" width="590" height="520" class="container" rx="4" />
  <text x="45" y="175" class="widget">CTkTabview</text>

  <!-- Lines Tab -->
  <rect x="40" y="180" width="580" height="480" class="container" rx="4" />
  <text x="50" y="200" class="subtitle">Lines Tab</text>
  
  <rect x="45" y="205" width="280" height="380" class="preview" rx="4" />
  <text x="55" y="225" class="widget">lines_list_frame (CTkScrollableFrame)</text>
  
  <rect x="330" y="205" width="280" height="380" class="preview" rx="4" />
  <text x="340" y="225" class="widget">lines_preview_container</text>
  <text x="340" y="240" class="widget">└─ lines_preview_label</text>
  
  <rect x="45" y="590" width="570" height="65" class="control" rx="4" />
  <text x="55" y="610" class="widget">Controls</text>
  <text x="55" y="625" class="widget">[Add Lines…] [−] [×]</text>

  <!-- Images Tab (Collapsed) -->
  <rect x="40" y="180" width="580" height="480" class="container" rx="4" opacity="0.3" />
  <text x="50" y="200" class="subtitle" opacity="0.3">Images Tab</text>

  <!-- Video Tab (Collapsed) -->
  <rect x="40" y="180" width="580" height="480" class="container" rx="4" opacity="0.3" />
  <text x="50" y="200" class="subtitle" opacity="0.3">Video Tab</text>

  <!-- Styles Panel (Right) -->
  <rect x="640" y="130" width="520" height="390" class="panel" rx="4" />
  <text x="650" y="150" class="subtitle">Styles Panel (styles_tabview)</text>

  <rect x="645" y="155" width="510" height="350" class="container" rx="4" />
  <text x="655" y="175" class="widget">CTkTabview</text>

  <!-- Style Tab -->
  <rect x="650" y="180" width="500" height="150" class="container" rx="4" />
  <text x="660" y="200" class="subtitle">Style Tab</text>
  
  <rect x="655" y="205" width="490" height="100" class="preview" rx="4" />
  <text x="665" y="225" class="widget">Preview</text>
  <text x="665" y="240" class="widget">└─ _style_previews["start"]</text>
  
  <rect x="655" y="310" width="490" height="15" class="control" rx="4" />
  <text x="665" y="322" class="widget">[Open Lines…] [path_label] [×]</text>

  <!-- End Style Tab -->
  <rect x="650" y="340" width="500" height="150" class="container" rx="4" />
  <text x="660" y="360" class="subtitle">End Style Tab</text>
  
  <rect x="655" y="365" width="490" height="100" class="preview" rx="4" />
  <text x="665" y="385" class="widget">Preview</text>
  <text x="665" y="400" class="widget">└─ _style_previews["end"]</text>
  
  <rect x="655" y="470" width="490" height="15" class="control" rx="4" />
  <text x="665" y="482" class="widget">[Open Lines…] [path_label] [×]</text>

  <!-- Outputs Section (Bottom) -->
  <rect x="20" y="710" width="1160" height="75" class="control" rx="4" />
  <text x="30" y="730" class="subtitle">Outputs Section (bottom_frame)</text>
  <text x="30" y="745" class="widget">[Export as▼] [Size▼] [⚫ Audio] [▓▓▓] [Export ▶]</text>
  <text x="30" y="760" class="widget">CTkOptionMenu  CTkOptionMenu  CTkSwitch  CTkProgressBar  CTkButton</text>

  <!-- Legend -->
  <rect x="20" y="710" width="180" height="75" fill="white" stroke="#ccc" stroke-width="1" rx="4" />
  <text x="30" y="730" class="subtitle" style="font-size:11px">Legend:</text>
  <rect x="30" y="740" width="15" height="10" class="panel" />
  <text x="50" y="749" class="widget" style="font-size:10px">Panel</text>
  <rect x="30" y="755" width="15" height="10" class="preview" />
  <text x="50" y="764" class="widget" style="font-size:10px">Preview</text>
  <rect x="30" y="770" width="15" height="10" class="control" />
  <text x="50" y="779" class="widget" style="font-size:10px">Control</text>

</svg>
